version: '3.8'

# =============================================================
# Energy Management System - Infrastructure
# Services: Zookeeper, Kafka, InfluxDB 1.8, Grafana
# =============================================================

services:
  # ---------- Zookeeper (Kafka coordination) ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ems_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - energy_net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Apache Kafka ----------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ems_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - energy_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------- InfluxDB 1.8 (Time-series DB) ----------
  influxdb:
    image: influxdb:1.8
    container_name: ems_influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: energy_db
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      INFLUXDB_REPORTING_DISABLED: "true"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - energy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Grafana (Visualization) ----------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: ems_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - energy_net

networks:
  energy_net:
    driver: bridge

volumes:
  influxdb_data:
  grafana_data:
